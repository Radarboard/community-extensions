name: Extension request
description: Suggest a new community integration, plugin, or widget.
title: "Extension request: "
labels:
  - extension-request
body:
  - type: input
    id: service
    attributes:
      label: Service or workflow
      description: Which service, product area, or workflow should this extension support?
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Extension type
      options:
        - Integration
        - Plugin
        - Widget
        - Combination
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What should Radarboard users be able to track or do?
    validations:
      required: true
  - type: textarea
    id: credentials
    attributes:
      label: Credentials and setup
      description: What account, API key, OAuth app, webhook, or MCP setup would this need?
    validations:
      required: false
  - type: textarea
    id: surfaces
    attributes:
      label: Expected surfaces
      description: Describe expected dashboard widgets, plugin overlays, MCP tools, notifications, or settings.
    validations:
      required: false
  - type: textarea
    id: quality
    attributes:
      label: Quality bar
      description: Include references, screenshots, APIs, rate limits, or examples that would help reviewers validate the extension.
    validations:
      required: false
