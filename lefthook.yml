glob_matcher: doublestar

pre-commit:
  parallel: true
  jobs:
    - name: biome-staged
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc,md,yml,yaml}"
      stage_fixed: true
      run: pnpm biome check --write --no-errors-on-unmatched --staged
    - name: extension-quality
      glob: "{integrations,plugins,widgets,packages,scripts,fixtures}/**/*"
      run: pnpm validate

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}

pre-push:
  parallel: true
  jobs:
    - name: biome-check
      run: pnpm biome check --no-errors-on-unmatched .
    - name: typecheck
      run: pnpm typecheck
    - name: extension-quality
      run: pnpm validate
    - name: tests
      run: pnpm test
